# Seed model registry for v0. Updated by acceptance gates as evals land.
# Numbers here are PRE-acceptance estimates (file_size from HF, vram_required
# estimated). Acceptance gates at M1 measure and overwrite. Per CR-4.5 we do
# NOT bake in any marketing-tier MMLU/PPL numbers.
#
# Quant family default is Unsloth Dynamic 2.0 where the model is supported.

models:
