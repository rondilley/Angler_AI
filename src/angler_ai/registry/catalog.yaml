  - id: qwen3.5-4b
    family: qwen3.5
    type: text
    total_params_b: 4.0
    active_params_b: 4.0
    context_length: 32768
    license: qwen
    hf_repo: unsloth/Qwen3.5-4B-GGUF
    quants:
      - name: Q4_K_M
        vram_required_mb: 3500
        file_size_mb: 2400
        gguf_file_pattern: "*Q4_K_M.gguf"
